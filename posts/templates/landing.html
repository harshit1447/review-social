{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Revue - Share what you think</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            background:
                radial-gradient(circle at 78% 14%, rgba(183, 121, 63, 0.2), transparent 28%),
                linear-gradient(135deg, #fff9ef 0%, #efd5b4 100%);
            color: #141414;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .landing {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            height: 100svh;
            margin: 0 auto;
            max-width: 1440px;
            padding: clamp(18px, 3.6vh, 40px) clamp(28px, 5vw, 72px) clamp(16px, 3vh, 34px);
        }

        .topbar {
            align-items: center;
            display: flex;
            justify-content: space-between;
            min-height: 54px;
        }

        .wordmark {
            color: #111;
            display: inline-block;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(3.6rem, 8vw, 6rem);
            font-style: italic;
            font-weight: 500;
            letter-spacing: -0.05em;
            line-height: 0.9;
            transform: skewX(-8deg);
        }

        .auth-actions {
            align-items: center;
            display: flex;
            gap: 12px;
        }

        .auth-actions a {
            align-items: center;
            border: 1px solid rgba(20, 20, 20, 0.18);
            border-radius: 999px;
            display: inline-flex;
            font-size: clamp(0.92rem, 1.15vw, 1.05rem);
            font-weight: 800;
            justify-content: center;
            min-height: 42px;
            min-width: 98px;
            padding: 8px 18px;
            transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
        }

        .auth-actions a:hover,
        .auth-actions a:focus-visible {
            background: #171615;
            border-color: #171615;
            color: #fff;
            transform: translateY(-1px);
        }

        .hero {
            align-items: center;
            display: flex;
            justify-content: flex-start;
            min-height: 0;
            padding: clamp(22px, 5vh, 56px) 0 clamp(34px, 7vh, 86px);
        }

        .hero-copy {
            max-width: 860px;
            min-width: 0;
        }

        .hero-copy h1 {
            font-size: clamp(3.6rem, 7vw, 6.2rem);
            letter-spacing: 0;
            line-height: 1.04;
            margin: 0;
        }

        .hero-copy h1 span {
            color: #a86432;
        }

        .hero-copy p {
            color: #5b554f;
            font-size: clamp(1.45rem, 2.1vw, 2.1rem);
            font-weight: 700;
            margin: clamp(10px, 1.8vh, 18px) 0 0;
        }

        .primary-action {
            align-items: center;
            background: #171615;
            border-radius: 999px;
            color: #fff;
            display: inline-flex;
            font-size: clamp(1rem, 1.35vw, 1.2rem);
            font-weight: 800;
            gap: 24px;
            justify-content: center;
            margin-top: clamp(18px, 3vh, 30px);
            min-height: 56px;
            padding: 14px 30px;
            transition: background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        .primary-action:hover,
        .primary-action:focus-visible {
            background: #7b451f;
            box-shadow: 0 16px 34px rgba(88, 55, 28, 0.24);
            transform: translateY(-2px);
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(22px, 4vw, 54px);
            margin-top: clamp(24px, 4.6vh, 52px);
        }

        .categories div {
            align-items: center;
            display: grid;
            gap: 10px;
            justify-items: center;
        }

        .symbol {
            align-items: center;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(20, 20, 20, 0.2);
            border-radius: 12px;
            display: inline-flex;
            height: 44px;
            justify-content: center;
            width: 44px;
        }

        .symbol svg {
            color: #5f3f23;
            display: block;
            height: 24px;
            width: 24px;
        }

        .categories strong {
            font-size: 1.12rem;
            font-weight: 700;
            text-align: center;
        }

        @media (max-width: 900px) {
            body {
                overflow: auto;
            }

            .landing {
                height: auto;
                min-height: 100svh;
            }

            .hero-copy h1 {
                font-size: clamp(3.3rem, 11vw, 5rem);
            }
        }

        @media (max-width: 560px) {
            .landing {
                padding: 22px 18px 28px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
                gap: 18px;
            }

            .auth-actions {
                width: 100%;
            }

            .auth-actions a {
                flex: 1;
            }

            .hero-copy h1 {
                font-size: clamp(2.8rem, 16vw, 4.1rem);
            }

            .categories {
                align-items: flex-start;
                flex-direction: column;
                gap: 18px;
            }
        }
    </style>
</head>
<body>
    <main class="landing">
        <nav class="topbar" aria-label="Primary">
            <a class="wordmark" href="{% url 'landing' %}" aria-label="Revue home">Revue</a>
            <div class="auth-actions">
                <a href="{% url 'account_login' %}">Log in</a>
                <a href="{% url 'signup' %}">Sign up</a>
            </div>
        </nav>

        <section class="hero">
            <div class="hero-copy">
                <h1>Share what you <span>think.</span></h1>
                <p>Watch. Read. Recommend.</p>
                <a class="primary-action" href="{% url 'signup' %}">Join the community <span aria-hidden="true">-></span></a>
                <div class="categories" aria-label="Categories">
                    <div>
                        <span class="symbol" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" role="presentation">
                                <rect x="3" y="6" width="18" height="13" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
                                <path d="M8 6V4.2M12 6V4.2M16 6V4.2M3 10.5H21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                <path d="M8.7 14H12.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <strong>Movies</strong>
                    </div>
                    <div>
                        <span class="symbol" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" role="presentation">
                                <path d="M4.2 5.3C4.2 4.6 4.8 4 5.5 4H11.1C12.7 4 14 5.3 14 6.9V20C14 18.9 13.1 18 12 18H5.5C4.8 18 4.2 17.4 4.2 16.7V5.3Z" stroke="currentColor" stroke-width="1.8"/>
                                <path d="M19.8 5.3C19.8 4.6 19.2 4 18.5 4H12.9C11.3 4 10 5.3 10 6.9V20C10 18.9 10.9 18 12 18H18.5C19.2 18 19.8 17.4 19.8 16.7V5.3Z" stroke="currentColor" stroke-width="1.8"/>
                            </svg>
                        </span>
                        <strong>Books</strong>
                    </div>
                    <div>
                        <span class="symbol" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" role="presentation">
                                <path d="M12 20.2C7.4 16.8 4.8 14.2 4.8 10.8C4.8 8.3 6.7 6.4 9.1 6.4C10.4 6.4 11.6 7.1 12.3 8.2C13 7.1 14.2 6.4 15.5 6.4C17.9 6.4 19.8 8.3 19.8 10.8C19.8 14.2 17.2 16.8 12.6 20.2L12.3 20.4L12 20.2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <strong>Life</strong>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
