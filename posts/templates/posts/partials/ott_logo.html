{% if provider.class == "prime" %}
    <svg class="ott-provider-logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="18" fill="#00A8E1"/>
        <text x="32" y="29" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="800" fill="#fff">prime</text>
        <text x="32" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#fff">video</text>
        <path d="M20 49c8 5 18 5 26-1" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </svg>
{% elif provider.class == "netflix" %}
    <svg class="ott-provider-logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="18" fill="#111"/>

    </svg>
{% elif provider.class == "hotstar" %}

{% elif provider.class == "sonyliv" %}
