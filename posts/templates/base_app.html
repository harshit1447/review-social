{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Review Social{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'posts/styles.css' %}">
</head>
<body>
    <div class="app-shell app-shell-authenticated">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a class="sidebar-brand" href="{% url 'feed' %}">
                    <span class="brand-mark">R</span>
                </a>
            </div>
            
            <nav class="sidebar-nav" aria-label="Main navigation">
                <a href="{% url 'feed' %}" class="sidebar-link {% if request.resolver_match.url_name == 'feed' %}active{% endif %}">
                    <span class="sidebar-icon">📰</span>
                    <span class="sidebar-label">Feed</span>
                </a>
                <a href="{% url 'friends' %}" class="sidebar-link {% if request.resolver_match.url_name == 'friends' %}active{% endif %}">
                    <span class="sidebar-icon">👥</span>
                    <span class="sidebar-label">Friends</span>
                </a>
                <a href="{% url 'profile' %}" class="sidebar-link {% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
                    <span class="sidebar-icon">👤</span>
                    <span class="sidebar-label">Profile</span>
                </a>
                <a href="{% url 'new_review' %}" class="sidebar-link {% if request.resolver_match.url_name == 'new_review' %}active{% endif %}">
                    <span class="sidebar-icon">✍️</span>
                    <span class="sidebar-label">Post</span>
                </a>
                <a href="{% url 'recommend' %}" class="sidebar-link {% if request.resolver_match.url_name == 'recommend' %}active{% endif %}">
                    <span class="sidebar-icon">⭐</span>
                    <span class="sidebar-label">Recommend</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <form method="post" action="{% url 'account_logout' %}" class="sidebar-logout-form">
                    {% csrf_token %}
                    <button type="submit" class="sidebar-logout">Logout</button>
                </form>
            </div>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
